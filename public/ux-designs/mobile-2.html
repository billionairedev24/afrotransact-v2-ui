</div>
</div>

<div class="mb-section-gap">
<h3 class="font-label-sm text-label-sm text-on-surface-variant mb-stack-sm uppercase tracking-wider">Shop</h3>
<nav class="flex flex-col gap-1">
<a class="flex items-center gap-stack-md px-4 py-3 rounded-full hover:bg-surface-container-high transition-colors text-secondary" href="#">

<span class="font-body-md text-body-md">All Categories</span>
</a>
<a class="flex items-center gap-stack-md px-4 py-3 rounded-full hover:bg-surface-container-high transition-colors text-secondary" href="#">
<span class="material-symbols-outlined">local_offer</span>
<span class="font-body-md text-body-md">Today's Deals</span>
</a>
</nav>
</div>
<hr class="border-t border-outline-variant my-stack-md"/>

<h3 class="font-label-sm text-label-sm text-on-surface-variant mb-stack-sm uppercase tracking-wider">My Account</h3>
